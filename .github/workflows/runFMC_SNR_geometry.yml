name: FMC-SNR-geometry-Analysis
on:
  workflow_dispatch:
    inputs:
      optics:
        description: 'Choose optics for the simulation'
        required: true
        default: 'TriScape100'
        type: choice
        options:
        - 'TriScape100'
        - 'TriScape200'
        - 'simulator'
      sensor:
        description: 'Choose sensor for the simulation'
        required: true
        default: 'CMV12000'
        type: choice
        options:
        - 'CMV12000'
        - 'GMAX3265'
        - 'VITA1300'
      full_dataset:
        description: 'Run SNR on full image dataset'
        required: true
        default: 'false'
        type: choice
        options:
        - 'true'
        - 'false'

jobs:
  run-GEO-analysis:
    name: Setup MATLAB and run GEO analysis
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025a
          cache: true
          products: >
            Signal_Processing_Toolbox
            Image_Processing_Toolbox

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m venv env
          env\Scripts\python.exe -m pip install -r requirements.txt

      - name: Run SNR geometry analysis
        uses: matlab-actions/run-command@v2
        with:
          command: |
            % Open project
            proj = openProject(pwd);

            % Set inputs
            optics = "${{ github.event.inputs.optics }}";
            sensor = "${{ github.event.inputs.sensor }}";
            full_dataset = strcmp("${{ github.event.inputs.full_dataset }}", "true");
            
            % Run geometry analysis
            SNR_FMC_geometry_analysis(optics,sensor,full_dataset);

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: snr-geometry-results
          path: IM_results/
          if-no-files-found: warn