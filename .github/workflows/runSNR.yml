name: SNR-Analysis
on:
  pull_request:
  workflow_dispatch:
    inputs:
      exposure_times:
        description: 'Exposure times for SNR analysis'
        required: true
        default: '[300:50:700]*10^-6'
        type: string

jobs:
  run-SNR-analysis:
    name: Setup MATLAB and run SNR analysis
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v2
        with:
          release: R2025a
          cache: true
          products: >
            Signal_Processing_Toolbox
            Image_Processing_Toolbox
      
      - name: Run SNR analysis
        uses: matlab-actions/run-command@v2
        with:
          command: |
            proj = openProject(pwd);
            im = image_processing();
            im.load_images();
            exposure = str2num("${{ github.event.inputs.exposure_times || '600*10^-6' }}");
            im.runSNR("blur",true,"noise",true,"exposures",exposure);
            im.runSNR("blur",false,"noise",true,"exposures",exposure);
      
      - name: Upload SNR results
        uses: actions/upload-artifact@v4
        with:
          name: snr-results
          path: |
            IM_results/
          if-no-files-found: warn
              
